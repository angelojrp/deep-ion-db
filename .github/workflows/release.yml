name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run web:build
      - run: npm run quality
      - run: npm run test -- --coverage

  # Cada SO apenas builda e sobe os instaladores como artifacts (sem publicar).
  build:
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: --linux
          - os: windows-latest
            platform: --win
          - os: macos-latest
            platform: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Só define as variáveis de assinatura quando há certificado configurado.
      # Passar CSC_LINK vazio faz o electron-builder tratá-lo como caminho de
      # arquivo ("not a file") e quebra o build não assinado. Ver docs/CODESIGN.md.
      - name: Configure code signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            {
              echo "CSC_LINK=$CSC_LINK"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Build installers
        run: npm run build && npx --no-install electron-builder ${{ matrix.platform }} --publish never

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.snap
            dist/*.yml
            dist/*.blockmap

  # Um único job junta todos os artifacts e publica UMA release — sem corrida.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**

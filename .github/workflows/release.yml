name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      # Serializado: evita corrida entre jobs publicando na mesma release (assets perdidos).
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-latest
            platform: --linux
          - os: windows-latest
            platform: --win
          - os: macos-latest
            platform: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run build && npx --no-install electron-builder ${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Não há certificado de assinatura: evita o electron-builder tentar assinar no macOS.
          CSC_IDENTITY_AUTO_DISCOVERY: false

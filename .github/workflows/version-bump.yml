name: Version Bump

# Dispara manualmente via GitHub UI ou API.
#
# A branch `main` é protegida por um ruleset que EXIGE pull request + checks
# obrigatórios (quality + e2e). Por isso este workflow NÃO commita/empurra
# direto em `main` — isso era rejeitado com "GH013: Repository rule violations"
# e gerava releases botadas (tag criada sem o bump aplicado). Ver issue #210.
#
# Fluxo correto (espelha o gitflow-policy, que aceita PRs de `release/*` → main):
#   1. cria a branch `release/vX.Y.Z` a partir de `main` com o bump aplicado;
#   2. abre um PR `release/vX.Y.Z` → `main` e habilita auto-merge;
#   3. quando os checks passam e o PR é mergeado, dispara o `tag-release.yml`,
#      que cria a tag `vX.Y.Z` e, por consequência, o `release.yml` (build/publish).
#
# IMPORTANTE — token: para que os checks de CI rodem no PR (e o auto-merge
# conclua) e para que a tag dispare o `release.yml`, as ações precisam de um
# token que NÃO seja o GITHUB_TOKEN padrão (o GitHub suprime workflows
# disparados pelo próprio GITHUB_TOKEN, para evitar recursão). Configure o
# secret `RELEASE_PAT` (PAT clássico com escopo `repo`/`workflow` ou token
# fine-grained com Contents+Pull requests: read/write). Sem ele, o workflow
# ainda PREPARA o PR, mas o merge/checks precisam ser acionados manualmente.

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Tipo de bump (patch | minor | major)'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Usa RELEASE_PAT quando disponível para que o PR dispare a CI.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version (sem tag)
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump_type }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Nova versão: ${NEW_VERSION}"

      - name: Cria branch release e empurra
        id: branch
        run: |
          BRANCH="release/${{ steps.bump.outputs.version }}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          git checkout -b "${BRANCH}"
          git add package.json package-lock.json
          git commit -m "chore(release): bump versao para ${{ steps.bump.outputs.version }}"
          git push origin "${BRANCH}"

      - name: Abre PR para main e habilita auto-merge
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(release): bump versao para ${VERSION}" \
            --body "Bump automático de versão para **${VERSION}** (workflow Version Bump).

          Ao mergear, o \`tag-release.yml\` cria a tag \`${VERSION}\` e dispara o build/publish dos instaladores.")
          echo "PR criado: ${PR_URL}"
          # Auto-merge conclui sozinho quando os checks obrigatórios passarem.
          gh pr merge "${PR_URL}" --auto --merge || \
            echo "::warning::Não foi possível habilitar auto-merge (provável falta de RELEASE_PAT). Mergeie o PR manualmente: ${PR_URL}"

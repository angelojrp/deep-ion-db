appId: com.angelojrp.deepiondb
productName: Deep Ion DB
copyright: Copyright © 2026 angelojrp

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/*.{md,map}'
  - '!**/*.ts'

# Módulo nativo: precisa ficar fora do asar para carregar em runtime.
asarUnpack:
  - '**/*.node'
  - '**/node_modules/better-sqlite3/**'

npmRebuild: true

publish:
  provider: github
  owner: angelojrp
  repo: deep-ion-db
  releaseType: release

win:
  icon: build/icon.ico
  target: nsis
  executableName: deep-ion-db
  artifactName: ${productName}-${version}-Windows-${arch}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}

mac:
  icon: build/icon.png
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-macOS-${arch}.${ext}
  # Assinatura/notarização (ver docs/CODESIGN.md). Só executam quando há
  # certificado (CSC_LINK) e credenciais Apple (APPLE_ID/...) no ambiente.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true

linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  category: Development
  maintainer: angelojrp <angelojrp@gmail.com>
  artifactName: ${productName}-${version}-Linux-${arch}.${ext}

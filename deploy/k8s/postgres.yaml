# PostgreSQL de metadados (self-host). Em produção, prefira um banco gerenciado
# e aponte META_DATABASE_URL para ele, removendo este recurso.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: deepion-meta-data
  namespace: deep-ion-db
spec:
  accessModes: ['ReadWriteOnce']
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepion-meta
  namespace: deep-ion-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepion-meta
  template:
    metadata:
      labels:
        app: deepion-meta
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: deepion-meta, key: META_DB_USER }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: deepion-meta, key: META_DB_PASSWORD }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: deepion-meta, key: META_DB_NAME }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ['sh', '-c', 'pg_isready -U "$POSTGRES_USER"']
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: deepion-meta-data
---
apiVersion: v1
kind: Service
metadata:
  name: deepion-meta
  namespace: deep-ion-db
spec:
  selector:
    app: deepion-meta
  ports:
    - port: 5432
      targetPort: 5432

# Opcional: exponha o servidor via Ingress (requer um ingress controller, ex.: nginx).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepion
  namespace: deep-ion-db
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
spec:
  rules:
    - host: deepion.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deepion-server
                port:
                  number: 80
